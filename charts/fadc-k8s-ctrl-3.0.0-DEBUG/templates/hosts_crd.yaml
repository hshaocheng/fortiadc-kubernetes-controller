apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hosts.fadk8sctrl.fortinet.com
spec:
  preserveUnknownFields: false
  group: fadk8sctrl.fortinet.com
  names:
    kind: Host
    plural: hosts
    singular: host
    shortNames:
      - host
  scope: Namespaced
  versions:
    -
      name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: HOSTNAME
          type: string
          jsonPath: .spec.hostname
        - name: DOMAIN
          type: string
          jsonPath: .spec.domain
        - name: STATUS
          type: string
          jsonPath: .status.status
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - hostname
                - domain
                - vdom
              properties:
                hostname:
                  type: string
                domain:
                  type: string
                singleRecord:
                  type: string
                  enum: [ enable, disable ]
                  default: disable
                persistence:
                  type: string
                  enum: [ enable, disable ]
                  default: disable
                lbMethod:
                  type: string
                  enum: [ weight, topology, global-availability ]
                  default: weight
                feedbackIPv4:
                  type: string
                  pattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])|(([0-9a-fA-F]{1,4}:){7,7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:)|fe80:(:[0-9a-fA-F]{0,4}){0,4}%[0-9a-zA-Z]{1,}|::(ffff(:0{1,4}){0,1}:){0,1}((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])|([0-9a-fA-F]{1,4}:){1,4}:((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9]))$'
                feedbackIPv6:
                  type: string
                  pattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])|(([0-9a-fA-F]{1,4}:){7,7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:)|fe80:(:[0-9a-fA-F]{0,4}){0,4}%[0-9a-zA-Z]{1,}|::(ffff(:0{1,4}){0,1}:){0,1}((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])|([0-9a-fA-F]{1,4}:){1,4}:((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9]))$'
                fortiview:
                  type: string
                  enum: [ enable, disable ]
                  default: disable
                virtualServerPools:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        pattern: '^[a-zA-Z]+([A-z0-9-_+])*([A-z0-9])$'
                      topology:
                        type: string
                        pattern: '^[a-zA-Z]+([A-z0-9-_+])*([A-z0-9])$'
                      isp:
                        type: string
                        pattern: '^[a-zA-Z]+([A-z0-9-_+])*([A-z0-9])$'
                      weight:
                        type: integer
                        minimum: 1
                        maximum: 255
                        default: 1
                      virtualServerPool:
                        type: object
                        required:
                          - name
                        properties:
                          preferred:
                            type: string
                            enum: [ NONE, GEO, GEO-ISP, RTT, Least-Connections, Connection-Limit, Bytes-Per-Second, Server-Performance ]
                            default: NONE
                          alternate:
                            type: string
                            enum: [ NONE, GEO, GEO-ISP, RTT, Least-Connections, Connection-Limit, Bytes-Per-Second, Server-Performance ]
                            default: NONE
                          preferredCPUMemoryRatio:
                            type: integer
                            minimum: 0
                            maximum: 10
                            default: 5
                          alternateCPUMemoryRatio:
                            type: integer
                            minimum: 0
                            maximum: 10
                            default: 5
                          checkVirtualServerExist:
                            type: string
                            enum: [ enable, disable ]
                            default: disable
                          lbMethod:
                            type: string
                            enum: [ wrr ]
                            default: wrr
                          virtualServers:
                            type: array
                            items:
                              type: object
                              required:
                                - server
                                - serverMember
                              properties:
                                #id:
                                server:
                                  type: string
                                  pattern: '^[a-zA-Z]+([A-z0-9-_+])*([A-z0-9])$'
                                serverMember:
                                  type: string
                                  pattern: '^[a-zA-Z]+([A-z0-9-_+])*([A-z0-9])$'
                                ttl:
                                  type: integer
                                  minimum: -1
                                  maximum: 2147483647
                                  default: -1
                                weight:
                                  type: integer
                                  minimum: 1
                                  maximum: 255
                                  default: 1
                                backup:
                                  type: string
                                  enum: [ enable, disable ]
                                  default: disable
                vdom:
                  type: string
                  pattern: '^[a-zA-Z]+[-A-z0-9_.]+$'
                  x-kubernetes-validations:
                    - message: "Vdom of virtual Server can not be changed."
                      rule: self == oldSelf
            status:
              type: object
              properties:
                hostname:
                  type: string
                  default: None
                domain:
                  type: string
                  default: None
                status:
                  type: string
                  default: Pending
      subresources:
        status: {}
